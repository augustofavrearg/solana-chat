[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
project_chat = "3C9uAwPX6Bbx2CybpPa1pWA7kFh5xsQLCPA4hbvkHDWE"

[programs.devnet]
project_chat = "3C9uAwPX6Bbx2CybpPa1pWA7kFh5xsQLCPA4hbvkHDWE"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 20000

[test.validator]
rpc_port = 18999
faucet_port = 19999

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
